apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      initContainers:
        - name: mysql-init-script
          image: busybox:1.36
          env:
            - name: MYSQL_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: mysql-app-password
            - name: KEYCLOAK_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: keycloak-db-password
          command:
            - /bin/sh
            - -c
            - |
              cat <<EOF > /initdb/01-init.sql
              CREATE DATABASE IF NOT EXISTS product_service;
              CREATE DATABASE IF NOT EXISTS order_service;
              CREATE DATABASE IF NOT EXISTS inventory_service;
              CREATE DATABASE IF NOT EXISTS notification_service;
              CREATE DATABASE IF NOT EXISTS keycloak;
              CREATE USER IF NOT EXISTS 'ibatulanand'@'%' IDENTIFIED BY '${MYSQL_APP_PASSWORD}';
              CREATE USER IF NOT EXISTS 'keycloak'@'%' IDENTIFIED BY '${KEYCLOAK_DB_PASSWORD}';
              GRANT ALL PRIVILEGES ON product_service.* TO 'ibatulanand'@'%';
              GRANT ALL PRIVILEGES ON order_service.* TO 'ibatulanand'@'%';
              GRANT ALL PRIVILEGES ON inventory_service.* TO 'ibatulanand'@'%';
              GRANT ALL PRIVILEGES ON notification_service.* TO 'ibatulanand'@'%';
              GRANT ALL PRIVILEGES ON keycloak.* TO 'keycloak'@'%';
              FLUSH PRIVILEGES;
              EOF
          volumeMounts:
            - name: mysql-init
              mountPath: /initdb
      containers:
        - name: mysql
          image: mysql:8.4
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: mysql-root-password
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: mysql-init
              mountPath: /docker-entrypoint-initdb.d
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h 127.0.0.1 -p"${MYSQL_ROOT_PASSWORD}"
            initialDelaySeconds: 60
            periodSeconds: 20
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h 127.0.0.1 -p"${MYSQL_ROOT_PASSWORD}"
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-pvc
        - name: mysql-init
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
spec:
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:latest
          ports:
            - containerPort: 9092
            - containerPort: 9093
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://:9092,CONTROLLER://:9093
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka:9092
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: 1@localhost:9093
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_HEAP_OPTS
              value: -Xms128m -Xmx256m
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
          startupProbe:
            tcpSocket:
              port: 9092
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 45
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: kafka-data
          persistentVolumeClaim:
            claimName: kafka-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
spec:
  selector:
    app: kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:25.0
          args:
            - start
            - --import-realm
            - --http-enabled=true
            - --proxy-headers=xforwarded
            - --hostname-strict=false
          ports:
            - containerPort: 8080
          env:
            - name: KC_DB
              value: mysql
            - name: KC_DB_URL_HOST
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: mysql-host
            - name: KC_DB_URL_PORT
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: mysql-port
            - name: KC_DB_URL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: mysql-keycloak-database
            - name: KC_DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: keycloak-db-user
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: keycloak-db-password
            - name: KEYCLOAK_ADMIN
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: keycloak-admin-user
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: keycloak-admin-password
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 768Mi
          volumeMounts:
            - name: keycloak-realm
              mountPath: /opt/keycloak/data/import/spring-boot-microservices-realm-realm.json
              subPath: spring-boot-microservices-realm.json
          readinessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 20
      volumes:
        - name: keycloak-realm
          configMap:
            name: keycloak-realm-import
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
spec:
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: 8080
