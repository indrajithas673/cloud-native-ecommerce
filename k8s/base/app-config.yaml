apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
data:
  kafka-bootstrap-servers: kafka:9092
  mysql-host: mysql
  mysql-port: "3306"
  mysql-app-user: ibatulanand
  mysql-product-database: product_service
  mysql-order-database: order_service
  mysql-inventory-database: inventory_service
  mysql-keycloak-database: keycloak
  keycloak-db-user: keycloak
  keycloak-admin-user: admin
  keycloak-realm: spring-boot-microservices-realm
  keycloak-issuer-uri: http://auth.invalid/realms/spring-boot-microservices-realm
  java-tool-options: "-Xmx256m -Xss512k"
